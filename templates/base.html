<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AuthZen{% endblock %} — IAM</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  {% block head %}{% endblock %}

  <style>
    * { font-family: 'Inter', sans-serif; }

    body {
      background: #0d1117;
      min-height: 100vh;
    }

    /* ── Auth Card ── */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 20%, #1a2a4a 0%, #0d1117 70%);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* ── Nav ── */
    .navbar-brand {
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Form ── */
    .form-control, .form-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e6edf3;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
      color: #e6edf3;
    }
    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 0.35rem;
    }
    .input-group-text {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8b949e;
    }

    /* ── Button ── */
    .btn-primary {
      background: linear-gradient(135deg, #4f8ef7, #7c6af7);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.65rem;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── Alert ── */
    .alert { border-radius: 10px; font-size: 0.88rem; border: none; }

    /* ── Dashboard ── */
    .stat-card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }

    .badge-role {
      background: rgba(79,142,247,0.15);
      color: #4f8ef7;
      border: 1px solid rgba(79,142,247,0.3);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .token-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #58a6ff;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 1.5rem 0;
    }

    a { color: #4f8ef7; text-decoration: none; }
    a:hover { color: #7c6af7; text-decoration: underline; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
